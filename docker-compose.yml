services:
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
    container_name: hr-nextjs
    restart: unless-stopped
    ports:
      - "3998:3000"
    environment:
      TZ: Asia/Seoul
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      AUTH_TRUST_HOST: "true"
      DISABLE_AUTH: ${DISABLE_AUTH:-false}
      # Phase 6-2E: 결재 승인 시 calendar-syncer 호출용
      CALENDAR_SYNCER_URL: ${CALENDAR_SYNCER_URL:-http://hr-calendar-syncer:8765}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      HR_PORTAL_TOKEN: ${HR_PORTAL_TOKEN}
      HR_WRITE_TOKEN: ${HR_WRITE_TOKEN}
      # 단계 C: 이메일 알림(nodemailer) — aggregator와 동일 .env 값 재사용
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      # Web Push (VAPID) — .env 값 컨테이너로 전달
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
    networks:
      - internal
      - vanam-db-net

  poller:
    build:
      context: ./poller
      dockerfile: Dockerfile
    container_name: hr-poller
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: Asia/Seoul
      SNMP_COMMUNITY: ${SNMP_COMMUNITY}
      ICC_URL: ${ICC_URL:-http://192.168.0.210:8800}
      ICC_USER: ${ICC_USER}
      ICC_PASSWORD: ${ICC_PASSWORD}
      ICC_SITE_ID: ${ICC_SITE_ID:-1}
      NOTIFIER_WEBHOOK_URL: ${NOTIFIER_WEBHOOK_URL:-}
      POLLER_DB_HOST: ${POLLER_DB_HOST:-localhost}
      POLLER_DB_PORT: ${POLLER_DB_PORT:-5433}
      POLLER_DB_NAME: ${POLLER_DB_NAME}
      POLLER_DB_USER: ${POLLER_DB_USER}
      POLLER_DB_PASSWORD: ${POLLER_DB_PASSWORD}
      POLLER_LOG_LEVEL: ${POLLER_LOG_LEVEL:-INFO}
      POLLER_LOG_FILE: ${POLLER_LOG_FILE:-/app/logs/poller.log}
      POLLER_DRY_RUN: ${POLLER_DRY_RUN:-false}
    volumes:
      - ./poller/logs:/app/logs

  aggregator:
    build:
      context: ./aggregator
      dockerfile: Dockerfile
    container_name: hr-aggregator
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul
      AGGREGATOR_DB_HOST: ${AGGREGATOR_DB_HOST:-inventory-web-postgres}
      AGGREGATOR_DB_PORT: ${AGGREGATOR_DB_PORT:-5432}
      AGGREGATOR_DB_NAME: ${AGGREGATOR_DB_NAME}
      AGGREGATOR_DB_USER: ${AGGREGATOR_DB_USER}
      AGGREGATOR_DB_PASSWORD: ${AGGREGATOR_DB_PASSWORD}
      AGGREGATOR_INTERVAL_SECONDS: ${AGGREGATOR_INTERVAL_SECONDS:-60}
      AGGREGATOR_LOG_LEVEL: ${AGGREGATOR_LOG_LEVEL:-INFO}
      AGGREGATOR_LOG_FILE: ${AGGREGATOR_LOG_FILE:-/app/logs/aggregator.log}
      # 알림 통로 통일 — HR 내부 API(/api/internal/notify)로 위임
      HR_INTERNAL_URL: ${HR_INTERNAL_URL:-http://hr-nextjs:3000}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
    volumes:
      - ./aggregator/logs:/app/logs
    networks:
      - internal
      - vanam-db-net

  calendar-syncer:
    build:
      context: ./calendar-syncer
      dockerfile: Dockerfile
    container_name: hr-calendar-syncer
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul
      CALENDAR_DB_HOST: ${CALENDAR_DB_HOST:-inventory-web-postgres}
      CALENDAR_DB_PORT: ${CALENDAR_DB_PORT:-5432}
      CALENDAR_DB_NAME: ${CALENDAR_DB_NAME}
      CALENDAR_DB_USER: ${CALENDAR_DB_USER}
      CALENDAR_DB_PASSWORD: ${CALENDAR_DB_PASSWORD}
      CALENDAR_SUBJECT_EMAIL: ${CALENDAR_SUBJECT_EMAIL}
      CALENDAR_KEY_FILE: ${CALENDAR_KEY_FILE:-/app/secrets/service-account-key.json}
      CALENDAR_LOG_LEVEL: ${CALENDAR_LOG_LEVEL:-INFO}
      CALENDAR_LOG_FILE: ${CALENDAR_LOG_FILE:-/app/logs/calendar-syncer.log}
      CALENDAR_WRITE_TARGET_ID: ${CALENDAR_WRITE_TARGET_ID}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      CALENDAR_HTTP_PORT: ${CALENDAR_HTTP_PORT:-8765}
    expose:
      - "8765"
    volumes:
      - ./calendar-syncer/logs:/app/logs
      - ./calendar-syncer/secrets:/app/secrets:ro
    networks:
      - internal
      - vanam-db-net

networks:
  internal:
    driver: bridge
  vanam-db-net:
    external: true
