services:
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hr-nextjs
    restart: unless-stopped
    ports:
      - "3998:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      AUTH_TRUST_HOST: "true"
      DISABLE_AUTH: ${DISABLE_AUTH:-false}
    networks:
      - internal
      - vanam-db-net

  poller:
    build:
      context: ./poller
      dockerfile: Dockerfile
    container_name: hr-poller
    restart: unless-stopped
    network_mode: host
    environment:
      SNMP_COMMUNITY: ${SNMP_COMMUNITY}
      POLLER_DB_HOST: ${POLLER_DB_HOST:-localhost}
      POLLER_DB_PORT: ${POLLER_DB_PORT:-5433}
      POLLER_DB_NAME: ${POLLER_DB_NAME}
      POLLER_DB_USER: ${POLLER_DB_USER}
      POLLER_DB_PASSWORD: ${POLLER_DB_PASSWORD}
      POLLER_LOG_LEVEL: ${POLLER_LOG_LEVEL:-INFO}
      POLLER_LOG_FILE: ${POLLER_LOG_FILE:-/app/logs/poller.log}
      POLLER_DRY_RUN: ${POLLER_DRY_RUN:-false}
    volumes:
      - ./poller/logs:/app/logs

networks:
  internal:
    driver: bridge
  vanam-db-net:
    external: true
